<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Image Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <main>
        <h1>Easy Image Calculator</h1>
        <form onsubmit="calculate(); return false">
            <div class="container">
                <div class="title">Current Image:</div>
                <div>
                    <input id="current-width" type="number" placeholder="Width" required>
                    <span>x</span>
                    <input id="current-height" type="number" placeholder="Height" required>
                </div>
            </div>
            <div class="container">
                <div class="title">Resize Image:</div>
                <div>
                    <input id="new-width" type="number" placeholder="New width" required>
                    <span>x</span>
                    <button>Get new height!</button>
                </div>
            </div>
        </form>
        <div id="show-result"></div>
    </main>
</body>

</html>
